<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Formation - Tago Dominique</title>
    <!-- LIEN VERS LE FICHIER DESIGN -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ÉCRAN 1 : CONNEXION ÉTUDIANT -->
<div id="ecran-connexion" class="card">
    <h2>🔒 Connexion Étudiant</h2>
    <div class="input-group">
        <label>Nom Complet de l'Apprenant</label>
        <input type="text" id="username" value="TAGO DOMINIQUE">
    </div>
    <div class="input-group">
        <label>Adresse Email</label>
        <input type="email" id="email" value="gondra011@gmail.com">
    </div>
    <button onclick="connecterEtudiant()">Accéder aux Modules</button>
</div>

<!-- ÉCRAN 2 : TABLEAU DE BORD (MODULES & HISTORIQUE) -->
<div id="ecran-modules" class="card" style="display: none;">
    <h2>📚 Tableau de Bord HSE</h2>
    <p id="bienvenue-msg" style="color: #4b5563; font-weight: bold; margin-bottom: 20px;"></p>
    
    <div id="liste-modules-container"></div>

    <h3 style="margin-top: 30px; text-align: left; color: #475569;">📊 Historique BDD des Scores</h3>
    <table class="historique-table">
        <thead>
            <tr><th>Module</th><th>Score</th><th>Pourcentage</th></tr>
        </thead>
        <tbody id="historique-bdd-corps"></tbody>
    </table>
</div>

<!-- ÉCRAN 3 : AFFICHAGE DU COURS TECHNIQUE -->
<div id="ecran-cours" class="card" style="display: none;">
    <h2 id="cours-titre">Cours</h2>
    <div id="cours-contenu" class="cours-texte"></div>
    <button onclick="demarrerQuizInteractif()">📝 Lancer le Questionnaire (20 Questions)</button>
    <button style="background-color: #64748b;" onclick="retourMenuPrincipal()">⬅️ Retour au Tableau de Bord</button>
</div>

<!-- ÉCRAN 4 : MODULE QUIZ INTERACTIF -->
<div id="ecran-quiz" class="card" style="display: none;">
    <h2 id="quiz-titre-module">Questionnaire</h2>
    <p id="quiz-progression" style="color: #64748b; font-weight: bold;"></p>
    <div id="quiz-question-texte" class="cours-texte" style="font-weight: bold; border-left-color: #3b82f6;"></div>
    <div id="quiz-options-container"></div>
    <button id="btn-continuer-quiz" style="display: none; background-color: #3b82f6;" onclick="questionSuivante()">Question Suivante ➡️</button>
</div>

<!-- ÉCRAN 5 : RAPPORT DE CERTIFICATION -->
<div id="ecran-resultat" class="card" style="display: none;">
    <h2>🏆 Fin du Module</h2>
    <h3 id="resultat-module-titre"></h3>
    <div class="cours-texte" style="text-align: center; font-size: 18px;">
        Votre Note : <span id="note-finale" style="font-weight: bold; color: #2563eb;"></span> / 20<br>
        Pourcentage : <span id="pourcentage-final" style="font-weight: bold;"></span>
    </div>
    <div id="mention-certification" style="font-size: 18px; font-weight: bold; margin-bottom: 20px;"></div>
    <button onclick="retourMenuPrincipal()">🔄 Retourner au Tableau de Bord</button>
</div>

<!-- LIEN VERS LE LOGICIEL QUIZ ET LA BASE DE DONNÉES -->
    <!-- Bibliothèque de génération PDF -->
<script src="https://cloudflare.com"></script>

<script src="quiz.js"></script>

</body>
</html>
