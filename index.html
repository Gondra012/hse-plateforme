<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Formation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        h2 { color: #333; margin-bottom: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; background-color: #f9f9f9; }
        button { width: 100%; padding: 14px; background-color: #10b981; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔒 Connexion</h2>
    <div class="input-group">
        <label>Nom d'utilisateur</label>
        <input type="text" value="TAGO DOMINIQUE" readonly>
    </div>
    <div class="input-group">
        <label>Adresse Email</label>
        <input type="text" value="gondra011@gmail.com" readonly>
    </div>
    <button onclick="window.location.reload()">Entrer</button>
</div>
</body>
</html>
