<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Formation - Tago Dominique</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; }
        h2 { color: #333; margin-bottom: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; background-color: #f9f9f9; }
        button { width: 100%; padding: 14px; background-color: #10b981; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #059669; }
        .hidden { display: none; }
        .module-btn { background-color: #3b82f6; text-align: left; padding: 15px; margin-bottom: 10px; border-radius: 6px; font-size: 15px; }
        .module-btn:hover { background-color: #2563eb; }
        .cours-texte { text-align: left; background: #f8fafc; padding: 15px; border-left: 4px solid #10b981; border-radius: 4px; white-space: pre-line; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- ÉCRAN 1 : CONNEXION -->
<div id="ecran-connexion" class="card">
    <h2>🔒 Connexion</h2>
    <div class="input-group">
        <label>Nom d'utilisateur</label>
        <input type="text" value="TAGO DOMINIQUE" readonly>
    </div>
    <div class="input-group">
        <label>Adresse Email</label>
        <input type="text" value="gondra011@gmail.com" readonly>
    </div>
    <button onclick="connecter()">Entrer</button>
</div>

<!-- ÉCRAN 2 : SÉLECTION DES MODULES -->
<div id="ecran-modules" class="card hidden">
    <h2>📚 Tableau de Bord HSE</h2>
    <p style="color: #666; margin-bottom: 20px;">Sélectionnez votre module de formation :</p>
    <button class="module-btn" onclick="ouvrirModule('Travaux en Hauteur')">👷 1. Travaux en Hauteur (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Habilitation Électrique')">⚡ 2. Habilitation Électrique (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Lutte contre l\'Incendie')">🧯 3. Lutte contre l'Incendie (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Corde & Sauvetage')">🧗 4. Corde & Sauvetage (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Assemblage au Mât')">🏗️ 5. Assemblage au Mât (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Élingage')">⛓️ 6. Élingage (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Conduite Défensive')">🚗 7. Conduite Défensive (Actif)</button>
    <button class="module-btn" onclick="ouvrirModule('Opérateur de Machines')">⚙️ 8. Opérateur de Machines (Actif)</button>
</div>

<!-- ÉCRAN 3 : AFFICHAGE DU COURS -->
<div id="ecran-cours" class="card hidden">
    <h2 id="cours-titre">Cours</h2>
    <div id="cours-contenu" class="cours-texte"></div>
    <button onclick="lancerQuiz()">📝 Démarrer le Questionnaire (20 questions)</button>
    <button style="background-color: #ef4444;" onclick="retourModules()">⬅️ Retour au menu</button>
</div>

<script>
    // Base de données locale pour l'interface Web
    const coursData = {
        "Travaux en Hauteur": "Le travail en hauteur est l'une des causes principales d'accidents graves au travail. Un travail est considéré en hauteur dès lors qu'il y a un risque de chute dans le vide.\n\nLa protection collective (garde-corps, filets) est TOUJOURS prioritaire sur la protection individuelle.",
        "Habilitation Électrique": "Le courant électrique présente deux risques majeurs : l'électrisation (passage du courant dans le corps) et l'électrocution (mortelle).\n\nAvant toute intervention, il faut réaliser une consignation (Séparer, Verrouiller, VAT, Mettre à la terre).",
        "Lutte contre l'Incendie": "Pour qu'un feu se déclare, trois éléments doivent être réunis : un Combustible, un Comburant (oxygène) et une Énergie d'activation (chaleur). C'est le Triangle du Feu.",
        "Corde & Sauvetage": "La règle absolue est la redondance : le cordiste doit toujours être connecté à deux systèmes de cordes indépendants : une corde de travail et une corde de sécurité.",
        "Assemblage au Mât": "L'assemblage de structures sur pylônes ou mâts présente des risques cumulés de chutes de grande hauteur et de chute d'objets. Le balisage d'une zone d'exclusion au sol est obligatoire.",
        "Élingage": "L'élingage consiste à lier une charge à un appareil de levage. Inspectez le matériel avant chaque utilisation : refuser toute élingue coupée ou sans étiquette de Charge Maximale Utile (CMU).",
        "Conduite Défensive": "La conduite défensive consiste à anticiper les dangers routiers. Respectez la règle des 2 secondes d'écart avec le véhicule qui précède (4 secondes sous la pluie).",
        "Opérateur de Machines": "Les carters de protection et les boutons d'arrêt d'urgence ne doivent jamais être retirés ou shuntés. Toute opération de réglage doit se faire machine à l'arrêt complet."
    };

    let moduleActuel = "";

    function connecter() {
        document.getElementById('ecran-connexion').classList.add('hidden');
        document.getElementById('ecran-modules').classList.remove('hidden');
    }

    function ouvrirModule(nomModule) {
        moduleActuel = nomModule;
        document.getElementById('ecran-modules').classList.add('hidden');
        document.getElementById('cours-titre').innerText = nomModule;
        document.getElementById('cours-contenu').innerText = coursData[nomModule];
        document.getElementById('ecran-cours').classList.remove('hidden');
    }

    function retourModules() {
        document.getElementById('ecran-cours').classList.add('hidden');
        document.getElementById('ecran-modules').classList.remove('hidden');
    }

    function lancerQuiz() {
        alert("Bravo ! Le questionnaire de 20 questions pour le module '" + moduleActuel + "' va s'initialiser.");
    }
</script>

</body>
</html>

<body>
<div class="card">
    <h2>🔒 Connexion</h2>
    <div class="input-group">

    </div>
    <div class="input-group">
        <label>Adresse Email</label>

    <button onclick="window.location.reload()">Entrer</button>
</div>
</body>
</html>
