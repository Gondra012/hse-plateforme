<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Formation Plateforme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        
        <!-- ================= PAGE CONNEXION / IDENTIFICATION ================= -->
        <div id="loginPage" class="page active">
            <div class="header">
                <span>🏗️</span>
                <h1>HSE Formation<br>Plateforme</h1>
            </div>
            <div class="subtitle">🔒 Identification Étudiant</div>
            <form id="loginForm" onsubmit="validerConnexion(event)">
                <div class="input-group">
                    <label for="studentName">Nom complet</label>
                    <input type="text" id="studentName" required placeholder="Ex: Jean Paul">
                </div>
                <div class="input-group">
                    <label for="studentEmail">Adresse Email</label>
                    <input type="email" id="studentEmail" required placeholder="Ex: jean@mail.com">
                </div>
                <button type="submit" class="action-btn btn-primary" style="width: 100%; margin-top: 10px;">Accéder aux Formations</button>
            </form>
        </div>

        <!-- ================= PAGE ACCUEIL / MODULES ================= -->
        <div id="homePage" class="page">
            <div class="header">
                <span id="userWelcome">👋 Bienvenue</span>
                <h1>Modules de Formation</h1>
            </div>
            <div class="subtitle">📚 Sélectionnez un Module (20 000 FCFA)</div>
            <div class="modules-list" id="modulesContainer"></div>
        </div>

        <!-- ================= PAGE QUESTIONNAIRE ================= -->
        <div id="quizPage" class="page">
            <div class="quiz-header">
                <div class="quiz-title" id="currentModuleTitle">Module</div>
                <div class="progress-bar" id="quizProgress">Question 1 sur 20</div>
            </div>
            <div class="question-text" id="questionText">Chargement...</div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="nav-actions">
                <button class="action-btn btn-secondary" onclick="quitterQuiz()">Quitter</button>
                <button class="action-btn btn-primary" id="nextBtn" onclick="questionSuivante()" disabled>Suivant</button>
            </div>
        </div>

        <!-- ================= PAGE RÉSULTATS ================= -->
        <div id="resultPage" class="page">
            <div class="header">
                <h1>Résultat du Test</h1>
            </div>
            <div class="result-card">
                <div id="scoreDisplay" class="score-circle">0/20</div>
                <div class="result-text" id="resultMessage">Résultat</div>
                <button class="action-btn btn-primary" style="width: 100%;" onclick="retourAccueil()">Retour aux Modules</button>
            </div>
        </div>
    </div>
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
